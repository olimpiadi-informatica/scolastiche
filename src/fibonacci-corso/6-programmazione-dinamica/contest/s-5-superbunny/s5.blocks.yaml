- type: start
  message0: inizia qui
  nextStatement: null
  colour: 20
  tooltip: L'esecuzione inizia da qui
  helpUrl: ""
  maxInstances: 1
  js: ""

- type: N
  message0: N
  output: Number
  colour: 20
  tooltip: il numero di ostacoli
  helpUrl: ""
  js: state.N

- type: terreno
  message0: terreno
  output: Number
  colour: 20
  tooltip: l'altezza di tutti i tratti di terreno
  helpUrl: ""
  js: state.H

- type: pedana
  message0: pedana %1 %2
  args0:
    - type: field_dropdown
      options:
        - [alta, A]
        - [bassa, B]
    - type: input_value
      check: Integer
      min: "1"
      max: state.N
  output: Number
  colour: 20
  tooltip: l'altezza della pedana data
  helpUrl: ""
  js: state.%1[(%2) - 1]

- type: differenza assoluta
  message0: "distanza tra %1\ne %2"
  args0:
    - type: input_value
      check: Number
    - type: input_value
      check: Number
  output: Number
  colour: 20
  tooltip: la distanza tra due numeri
  helpUrl: ""
  js: Math.abs((%1) - (%2))

- type: salta
  message0: salta in %1
  args0:
    - type: field_dropdown
      options:
        - [alto, A]
        - [basso, B]
  previousStatement: null
  nextStatement: null
  colour: 20
  tooltip: salta sulla prossima pedana in alto o in basso
  helpUrl: ""
  js: |
    (function(V) {
      if (state.posx % 2 === 1) exit(false, "non hai una pedana davanti a te");
      if (state.posx === 2*state.N) exit(false, "non puoi saltare oltre la fine");
      state.posy = V[state.posx/2];
      ++state.posx;
      state.time += Math.abs(state.posy - state.H);
    })(state.%1);

- type: saltaterreno
  message0: salta sul terreno
  previousStatement: null
  nextStatement: null
  colour: 20
  tooltip: salta da una pedana sul prossimo tratto di terreno
  helpUrl: ""
  js: |
    (function() {
      if (state.posx % 2 === 0) exit(false, "non hai un tratto di terreno davanti a te");
      state.time += Math.abs(state.posy - state.H);
      state.posy = state.H;
      ++state.posx;
    })();

- type: termina
  message0: termina
  previousStatement: null
  colour: 20
  tooltip: concludi il livello
  helpUrl: ""
  js: |
    (function() {
      if (state.posx < 2*state.N) exit(false, "non hai finito il livello");
      if (state.time > state.sol) exit(false, "potevi metterci meno di " + state.time + " tempo");
      if (state.time < state.sol) exit(false, "PROBLEMA TECNICO");
      exit(true, "hai finito il livello nel tempo minimo, complimenti!");
    })();
